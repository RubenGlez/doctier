<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="doctier: tiered privacy and lifecycle for generated documents, over git">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1322"/>
      <stop offset="1" stop-color="#141c30"/>
    </linearGradient>
    <linearGradient id="wm" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e8edf7"/>
      <stop offset="1" stop-color="#b9c5dd"/>
    </linearGradient>
    <!-- document glyph -->
    <g id="doc">
      <path d="M0 4 a4 4 0 0 1 4-4 h20 l12 12 v30 a4 4 0 0 1 -4 4 h-28 a4 4 0 0 1 -4-4 z" fill="none" stroke-width="2.5"/>
      <path d="M24 0 v12 h12" fill="none" stroke-width="2.5"/>
      <line x1="8" y1="22" x2="28" y2="22" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="8" y1="30" x2="28" y2="30" stroke-width="2.5" stroke-linecap="round"/>
    </g>
  </defs>

  <rect x="0" y="0" width="1200" height="560" rx="18" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="1199" height="559" rx="17.5" fill="none" stroke="#2a3450"/>

  <!-- ══════════ left: wordmark + pitch ══════════ -->

  <!-- tier mark: three stacked layers, one per tier -->
  <g transform="translate(72,96)">
    <rect x="14" y="0"  width="44" height="12" rx="6" fill="#4fd1a5"/>
    <rect x="7"  y="20" width="58" height="12" rx="6" fill="#a78bfa"/>
    <rect x="0"  y="40" width="72" height="12" rx="6" fill="#8b95ab" opacity="0.55"/>
  </g>

  <text x="168" y="141" font-size="62" font-weight="700" fill="url(#wm)" letter-spacing="-1">doctier</text>

  <text x="72" y="207" font-size="24" fill="#c4cede" font-weight="600">Tiered privacy &amp; lifecycle for generated</text>
  <text x="72" y="240" font-size="24" fill="#c4cede" font-weight="600">docs, built on nothing but git.</text>
  <text x="72" y="272" font-size="16" fill="#8ea0be" font-weight="500">a practical fit for spec-driven development &amp; coding agents</text>

  <!-- chips -->
  <g font-size="15" font-weight="600">
    <rect x="72" y="296" width="150" height="34" rx="17" fill="#12261f" stroke="#2c5c49"/>
    <text x="147" y="318" fill="#4fd1a5" text-anchor="middle">age-encrypted</text>
    <rect x="234" y="296" width="112" height="34" rx="17" fill="#1c1830" stroke="#4c3f78"/>
    <text x="290" y="318" fill="#a78bfa" text-anchor="middle">auto-GC</text>
    <rect x="358" y="296" width="150" height="34" rx="17" fill="#1a2133" stroke="#33405e"/>
    <text x="433" y="318" fill="#9fb0cc" text-anchor="middle">zero new infra</text>
  </g>

  <!-- manifest → git primitives -->
  <g transform="translate(72,364)">
    <rect x="0" y="0" width="436" height="132" rx="12" fill="#0b101c" stroke="#252f49"/>
    <text x="20" y="30" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" fill="#8b95ab">.doctier.yml</text>
    <text y="60" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">
      <tspan x="20" fill="#4fd1a5">docs/strategy/**</tspan><tspan x="188" fill="#5d6a85">→</tspan><tspan x="216" fill="#dfe6f2">private · durable</tspan>
    </text>
    <text y="86" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">
      <tspan x="20" fill="#4fd1a5">**/*.prd.md</tspan><tspan x="188" fill="#5d6a85">→</tspan><tspan x="216" fill="#dfe6f2">dies on pr-merge</tspan>
    </text>
    <text x="20" y="112" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" fill="#5d6a85">one manifest → filters · hooks · gc</text>
  </g>

  <!-- ══════════ right: the 2×2 matrix ══════════ -->

  <!-- axis titles -->
  <text x="861" y="84" font-size="14" fill="#7482a0" text-anchor="middle" letter-spacing="3" font-weight="700">LIFETIME</text>
  <text x="553" y="311" font-size="14" fill="#7482a0" text-anchor="middle" letter-spacing="3" font-weight="700" transform="rotate(-90 553 311)">VISIBILITY</text>

  <!-- column headers -->
  <text x="720" y="118" font-size="18" fill="#aab4c8" text-anchor="middle" font-weight="700">durable</text>
  <text x="1003" y="118" font-size="18" fill="#aab4c8" text-anchor="middle" font-weight="700">ephemeral</text>

  <!-- row labels -->
  <text x="585" y="216" font-size="18" fill="#4fd1a5" text-anchor="middle" font-weight="700" transform="rotate(-90 585 216)">public</text>
  <text x="585" y="408" font-size="18" fill="#a78bfa" text-anchor="middle" font-weight="700" transform="rotate(-90 585 408)">private</text>

  <!-- cells -->
  <!-- public · durable -->
  <g transform="translate(604,136)">
    <rect width="232" height="160" rx="12" fill="#101a22" stroke="#2c5c49"/>
    <use href="#doc" x="26" y="26" stroke="#4fd1a5"/>
    <text x="90" y="46" font-size="17" fill="#e6ecf6" font-weight="700">tracked</text>
    <text x="90" y="70" font-size="15" fill="#8b95ab">plaintext</text>
    <text x="26" y="122" font-size="14" fill="#5d6a85">plain git's default:</text>
    <text x="26" y="142" font-size="14" fill="#5d6a85">shared forever</text>
  </g>

  <!-- public · ephemeral -->
  <g transform="translate(887,136)">
    <rect width="232" height="160" rx="12" fill="#101a22" stroke="#2c5c49" stroke-dasharray="7 5"/>
    <use href="#doc" x="26" y="26" stroke="#4fd1a5"/>
    <!-- clock badge -->
    <g transform="translate(52,58)">
      <circle cx="12" cy="12" r="12" fill="#101a22" stroke="#f0b429" stroke-width="2.5"/>
      <path d="M12 6 v6 l5 3" fill="none" stroke="#f0b429" stroke-width="2.5" stroke-linecap="round"/>
    </g>
    <text x="90" y="46" font-size="17" fill="#e6ecf6" font-weight="700">tracked,</text>
    <text x="90" y="70" font-size="17" fill="#e6ecf6" font-weight="700">then collected</text>
    <text x="26" y="122" font-size="14" fill="#5d6a85">travels in the PR,</text>
    <text x="26" y="142" font-size="14" fill="#5d6a85">gc'd on merge / ttl</text>
  </g>

  <!-- private · durable -->
  <g transform="translate(604,328)">
    <rect width="232" height="160" rx="12" fill="#161428" stroke="#4c3f78"/>
    <use href="#doc" x="26" y="26" stroke="#a78bfa"/>
    <!-- lock badge -->
    <g transform="translate(52,56)">
      <rect x="0" y="10" width="24" height="18" rx="4" fill="#161428" stroke="#a78bfa" stroke-width="2.5"/>
      <path d="M5 10 v-3 a7 7 0 0 1 14 0 v3" fill="none" stroke="#a78bfa" stroke-width="2.5"/>
    </g>
    <text x="90" y="46" font-size="17" fill="#e6ecf6" font-weight="700">tracked,</text>
    <text x="90" y="70" font-size="17" fill="#e6ecf6" font-weight="700">encrypted</text>
    <text x="26" y="122" font-size="14" fill="#5d6a85">age blobs in git,</text>
    <text x="26" y="142" font-size="14" fill="#5d6a85">your SSH keys unlock</text>
  </g>

  <!-- private · ephemeral · sensitive -->
  <g transform="translate(887,328)">
    <rect width="232" height="160" rx="12" fill="#161428" stroke="#4c3f78" stroke-dasharray="7 5"/>
    <g opacity="0.55">
      <use href="#doc" x="26" y="26" stroke="#a78bfa" stroke-dasharray="4 4"/>
    </g>
    <!-- no-entry badge -->
    <g transform="translate(52,58)">
      <circle cx="12" cy="12" r="12" fill="#161428" stroke="#e5686c" stroke-width="2.5"/>
      <line x1="5" y1="12" x2="19" y2="12" stroke="#e5686c" stroke-width="2.5" stroke-linecap="round"/>
    </g>
    <text x="90" y="46" font-size="17" fill="#e6ecf6" font-weight="700">never</text>
    <text x="90" y="70" font-size="17" fill="#e6ecf6" font-weight="700">committed</text>
    <text x="26" y="122" font-size="14" fill="#5d6a85">local scratch, dies</text>
    <text x="26" y="142" font-size="14" fill="#5d6a85">with the worktree</text>
  </g>

  <!-- fail-closed footnote -->
  <text x="861" y="522" font-size="15" fill="#7482a0" text-anchor="middle">fail-closed: a private doc can't be committed in cleartext</text>
</svg>
