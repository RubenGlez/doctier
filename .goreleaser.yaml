# GoReleaser config — cross-compiled binaries, checksums, and a Homebrew
# formula, all published to GitHub Releases on a `v*` tag.
# Docs: https://goreleaser.com
version: 2

project_name: doctier

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/rubenglez/doctier/cmd.Version={{ .Version }}
    mod_timestamp: "{{ .CommitTimestamp }}"
    # Sign (and notarize) the darwin binaries with Apple's real codesign +
    # notarytool. This MUST run on a macOS runner: GoReleaser's built-in quill
    # notarizer signs on Linux, but quill's signature is rejected by Apple
    # Silicon's kernel at exec (Killed: 9) even after Apple notarizes it. The hook
    # no-ops for non-darwin targets and for local snapshot builds without a cert.
    hooks:
      post:
        - cmd: ./scripts/macos-sign.sh "{{ .Path }}" "{{ .Os }}"
          output: true

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

# Homebrew cask, committed to the Casks/ directory of this same repo (so the
# repo doubles as its own tap — no separate homebrew-tap repo). Casks are the
# current way to distribute prebuilt binaries via Homebrew; `brews` (formulas
# from binaries) is deprecated. Uses the release GITHUB_TOKEN to push here.
homebrew_casks:
  - repository:
      owner: RubenGlez
      name: doctier
    binaries:
      - doctier
    homepage: "https://github.com/RubenGlez/doctier"
    description: "Tiered privacy and lifecycle for generated documents, over git."
    commit_author:
      name: goreleaser
      email: goreleaser@users.noreply.github.com
    # Don't publish the cask for pre-release tags (e.g. v1.0.0-rc1).
    skip_upload: auto

release:
  draft: false

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
